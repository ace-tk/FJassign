<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Dashboard — Finance Tracker</title>
</head>
<body>

  <h2>Dashboard</h2>

  <!-- Show the logged-in user's name -->
  <p id="welcomeMessage">Loading...</p>

  <hr />

  <h3>Test Protected Route</h3>
  <p>Click the button to call <code>GET /api/test</code> with your JWT token.</p>

  <button id="testBtn">Call Protected Route</button>

  <!-- Response from the server will appear here -->
  <pre id="responseBox"></pre>

  <hr />

  <!-- Logout clears localStorage and goes back to login -->
  <button id="logoutBtn">Logout</button>

  <script>
    // ── On page load: check if user is logged in ──────────────────────────────
    const token = localStorage.getItem('token');  // Read token from storage
    const user  = JSON.parse(localStorage.getItem('user') || 'null'); // Read user info

    if (!token) {
      // No token means the user hasn't logged in — send them to login page
      alert('You are not logged in. Redirecting to login...');
      window.location.href = '/login.html';
    } else {
      // Show welcome message with the user's name
      document.getElementById('welcomeMessage').textContent =
        `👋 Welcome, ${user?.name || 'User'}! (${user?.email})`;
    }

    // ── Test Protected Route Button ───────────────────────────────────────────
    document.getElementById('testBtn').addEventListener('click', async () => {
      const responseBox = document.getElementById('responseBox');
      responseBox.textContent = 'Calling /api/test ...';

      try {
        // Step 1: Send GET request to the protected route
        // We add the token in the Authorization header as "Bearer <token>"
        const response = await fetch('/api/test', {
          method: 'GET',
          headers: {
            // This is how we send the JWT — the server's middleware reads this
            'Authorization': 'Bearer ' + token,
          },
        });

        // Step 2: Parse the JSON response
        const data = await response.json();

        if (response.ok) {
          // Success — display the full response nicely formatted
          responseBox.textContent = '✅ Success!\n\n' + JSON.stringify(data, null, 2);
          console.log('Protected route response:', data);
        } else {
          // Token was invalid or expired
          responseBox.textContent = '❌ Error: ' + data.message;
          console.error('Protected route failed:', data);
        }

      } catch (error) {
        responseBox.textContent = '❌ Could not connect to the server.';
        console.error('Network error:', error);
      }
    });

    // ── Logout Button ─────────────────────────────────────────────────────────
    document.getElementById('logoutBtn').addEventListener('click', () => {
      // Remove token and user info from localStorage
      localStorage.removeItem('token');
      localStorage.removeItem('user');

      // Go back to login page
      window.location.href = '/login.html';
    });
  </script>

</body>
</html>
