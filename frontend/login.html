<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Login — Finance Tracker</title>
</head>
<body>

  <h2>Login</h2>

  <!-- Login Form -->
  <form id="loginForm">
    <div>
      <label>Email:</label><br />
      <input type="email" id="email" placeholder="john@example.com" required />
    </div>
    <br />
    <div>
      <label>Password:</label><br />
      <input type="password" id="password" placeholder="secret123" required />
    </div>
    <br />
    <button type="submit">Login</button>
  </form>

  <!-- This paragraph shows success or error messages -->
  <p id="message"></p>

  <p>Don't have an account? <a href="/register.html">Register here</a></p>

  <script>
    const form    = document.getElementById('loginForm');
    const message = document.getElementById('message');

    form.addEventListener('submit', async (event) => {
      // Prevent page refresh
      event.preventDefault();

      // Step 1: Read email and password from the form
      const email    = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      try {
        // Step 2: Send POST request to the login API
        const response = await fetch('/api/auth/login', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({ email, password }),
        });

        // Step 3: Parse the response
        const data = await response.json();

        if (response.ok) {
          // Step 4: Save the JWT token in localStorage
          // localStorage stores data in the browser even after page refresh
          localStorage.setItem('token', data.token);

          // Also save basic user info for display on dashboard
          localStorage.setItem('user', JSON.stringify(data.user));

          message.textContent = '✅ Login successful! Redirecting...';
          console.log('Login success. Token saved to localStorage.');
          console.log('Token:', data.token);

          // Step 5: Redirect to the dashboard
          setTimeout(() => {
            window.location.href = '/dashboard.html';
          }, 1000);

        } else {
          // Wrong email or password
          message.textContent = '❌ ' + data.message;
          console.error('Login failed:', data);
        }

      } catch (error) {
        message.textContent = '❌ Could not connect to the server. Is it running?';
        console.error('Network error:', error);
      }
    });
  </script>

</body>
</html>
